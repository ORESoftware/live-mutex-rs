[server]
bind_host = "127.0.0.1"
tcp_port = 19180
http_port = 19181
disable_tcp = true
disable_http = false
tcp_nodelay = true
tcp_quickack = true

[broker]
default_ttl_ms = 4000
max_lock_holders = 1
max_concurrency_cap = 1000
ttl_sweep_interval_ms = 10
idle_key_grace_ms = 60000

[raft]
enabled = false
