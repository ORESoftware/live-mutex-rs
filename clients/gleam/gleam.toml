name = "dd_rust_network_mutex_client"
version = "0.1.0"
target = "erlang"
description = "Gleam client for the rust-network-mutex-rs broker. Uses Gleam custom types (true sum types) for Request/Response."

[dependencies]
gleam_stdlib = ">= 0.68.0 and < 2.0.0"
gleam_json = ">= 2.0.0 and < 4.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
